<!DOCTYPE html>

<html class="light" lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Roamble - 発見</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ecec",
                        "accent-orange": "#ff9f43",
                        "background-light": "#f6f8f8",
                        "background-dark": "#102222",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "Noto Sans JP", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .card-gradient {
            background: linear-gradient(180deg, rgba(0,0,0,0) 50%, rgba(0,0,0,0.8) 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-[#111818] dark:text-white antialiased overflow-x-hidden">
<!-- Main Container (Mobile Form Factor) -->
<div class="relative flex h-screen max-w-md mx-auto flex-col bg-background-light dark:bg-background-dark shadow-2xl">
<!-- TopAppBar -->
<header class="flex items-center justify-between px-6 pt-6 pb-2 bg-transparent z-10">
<div class="flex items-center gap-1 bg-white/80 dark:bg-white/10 backdrop-blur-md px-3 py-1.5 rounded-full shadow-sm">
<span class="material-symbols-outlined text-primary text-xl">location_on</span>
<span class="text-sm font-bold">渋谷区, 東京</span>
</div>
<h1 class="text-xl font-extrabold tracking-tighter text-[#111818] dark:text-white">Roamble</h1>
<button class="size-10 flex items-center justify-center bg-white dark:bg-white/10 rounded-full shadow-sm">
<span class="material-symbols-outlined text-[#111818] dark:text-white">person</span>
</button>
</header>
<!-- Discovery Card Section -->
<main class="flex-1 flex flex-col px-4 pt-4 pb-2 relative overflow-hidden">
<!-- Swipeable Card -->
<div class="relative w-full h-full rounded-xl overflow-hidden shadow-2xl group">
<div class="absolute inset-0 bg-cover bg-center transition-transform duration-500 group-hover:scale-105" data-alt="Modern cozy interior of a hidden cafe with warm lighting" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuC4d8c50_HkVn2Pq__jR_GPGn3jFC9KYCAHYKZCdAwuDCoEQn2hyjJ_lIwlpz6dPIpTWOsOVEMB_zSYkHZK3-lom3kNi_rSdHC8gSArnSVb3elrKGGRhhIbOEYi3L1uPEtPoRArKJQg4cAcpgjdbQDkOQq-L4AnHonEFSJS4O3Z7esGEN-6MrJ9T2UVKYVK-xgVxlaXj6f4Vau5abD0HQUoX-K06ty18MO2fu3QHRdATSyScSY3MoaW5VIiWuv9Z3vZ2_zBIvfV_xs");'>
</div>
<!-- Overlay Gradients -->
<div class="absolute inset-0 card-gradient"></div>
<!-- Card Content Overlay -->
<div class="absolute bottom-0 left-0 w-full p-6 text-white">
<div class="flex items-center gap-2 mb-2">
<span class="bg-primary text-[#111818] text-[10px] font-bold px-2 py-0.5 rounded-full uppercase tracking-wider">NEW SPOT</span>
<span class="bg-white/20 backdrop-blur-md text-white text-[10px] font-bold px-2 py-0.5 rounded-full uppercase tracking-wider">隠れ家</span>
</div>
<h2 class="text-3xl font-extrabold leading-tight mb-1">Moonlight Cafe</h2>
<div class="flex items-center gap-3 text-sm font-medium opacity-90">
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-sm">coffee</span>
<span>Cafe</span>
</div>
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-sm">near_me</span>
<span>1.2km先</span>
</div>
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-accent-orange text-sm" style="font-variation-settings: 'FILL' 1">star</span>
<span>4.5</span>
</div>
</div>
</div>
<!-- Swipe Cues (Visual only) -->
<div class="absolute top-1/2 left-4 -translate-y-1/2 opacity-0 group-hover:opacity-100 transition-opacity">
<div class="size-12 rounded-full border-2 border-white flex items-center justify-center text-white">
<span class="material-symbols-outlined">close</span>
</div>
</div>
<div class="absolute top-1/2 right-4 -translate-y-1/2 opacity-0 group-hover:opacity-100 transition-opacity">
<div class="size-12 rounded-full border-2 border-primary flex items-center justify-center text-primary">
<span class="material-symbols-outlined">favorite</span>
</div>
</div>
</div>
</main>
<!-- Action Section -->
<section class="px-6 py-4 flex flex-col gap-4">
<!-- Big Check-in Button -->
<button class="w-full bg-primary hover:bg-[#0fd9d9] active:scale-95 transition-all text-[#111818] h-16 rounded-full flex items-center justify-center gap-3 shadow-[0_8px_20px_rgba(19,236,236,0.3)]">
<span class="material-symbols-outlined font-bold">check_circle</span>
<span class="text-lg font-extrabold">Check-in! (+50 XP)</span>
</button>
<!-- Secondary Actions -->
<div class="flex justify-between px-10">
<div class="flex flex-col items-center gap-1">
<button class="size-12 rounded-full bg-white dark:bg-white/10 flex items-center justify-center shadow-sm border border-gray-100 dark:border-white/5">
<span class="material-symbols-outlined text-[#111818] dark:text-white">close</span>
</button>
<span class="text-[10px] font-bold text-gray-400 dark:text-gray-500">スキップ</span>
</div>
<div class="flex flex-col items-center gap-1">
<button class="size-12 rounded-full bg-white dark:bg-white/10 flex items-center justify-center shadow-sm border border-gray-100 dark:border-white/5">
<span class="material-symbols-outlined text-accent-orange" style="font-variation-settings: 'FILL' 1">favorite</span>
</button>
<span class="text-[10px] font-bold text-gray-400 dark:text-gray-500">お気に入り</span>
</div>
</div>
</section>
<!-- Bottom Navigation Bar -->
<nav class="mt-auto bg-white dark:bg-background-dark border-t border-gray-100 dark:border-white/5 px-6 pb-8 pt-3 flex items-center justify-between">
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">explore</span>
<span class="text-[10px] font-bold">発見</span>
</a>
<a class="flex flex-col items-center gap-1 text-gray-400 dark:text-gray-500" href="#">
<span class="material-symbols-outlined">search</span>
<span class="text-[10px] font-bold">検索</span>
</a>
<a class="flex flex-col items-center gap-1 text-gray-400 dark:text-gray-500" href="#">
<span class="material-symbols-outlined">bookmark</span>
<span class="text-[10px] font-bold">保存</span>
</a>
<a class="flex flex-col items-center gap-1 text-gray-400 dark:text-gray-500" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-bold">マイページ</span>
</a>
</nav>
<!-- Map Background (Hint of location) -->
<div class="absolute inset-0 -z-10 opacity-5 grayscale pointer-events-none" data-alt="Subtle map pattern of Tokyo city streets" data-location="Tokyo" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuD2yPEEnxVIeJ_Sdz1NCEPfLdtUl0wGwu8mHQbANWAlk96zOyvsR3FIFHS23vlWA3lQn0L-3YSNPIkXs2n-5Uk5yZdOwqilslSItUNVbxILTxWaI3fP8uSOlNQzcUBIW9f1IIhCg42Ea-v6OfY6dtPD8Qkq0fIPdHbDEfuDfyo1M95xRwz6OhDgfHTqvOq2gfWIIizAo-P-WUivBLyimuZintWrMy3wW6pebECRestMvL6rqiMR59jbJj65uveyXzSlL5aCvCn5nEY");'>
</div>
</div>
