<!DOCTYPE html>

<html class="dark" lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Noto+Sans+JP:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#8c25f4",
                        "background-light": "#f7f5f8",
                        "background-dark": "#191022",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "Noto Sans JP", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-panel {
            background: rgba(25, 16, 34, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(140, 37, 244, 0.2);
        }
        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 2px;
        }
        .glow-effect {
            box-shadow: 0 0 40px rgba(140, 37, 244, 0.4);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display overflow-hidden">
<!-- Underlying Screen Background (Map & Context) -->
<div class="relative h-screen w-full overflow-hidden">
<div class="absolute inset-0 z-0">
<div class="w-full h-full bg-center bg-no-repeat bg-cover" data-alt="Blurred map showing city streets and cafes" data-location="Tokyo, Japan" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCoqF-hEes9b-Fgc-zhAhzTppgDEYDnH5oWi6i2pbzoANklZBgxn2z6mboU3dduaoXxMbUFq-4cKO9JMf6Rk9YDA066iFopYUdTlLaOvjBNPSO5seeIVkiLknrrXSq_QxpzBqf6xt8wjvHosveQ8uTRb0q0SKM_i-vO25DK-CFkvkspH_X0_-7Eyy4lYLk1q7aQ8ptSzZ-zz9cUzrkH27QTs8fgex5sOap_jeYmb58Kf2qa1-sodYMF4ES83FCHpIlJDNqvVcN3UJw');">
</div>
<div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
</div>
<!-- Reward Modal Container -->
<div class="relative z-10 flex flex-col h-full w-full items-center justify-end p-6">
<!-- Confetti Layer (Simulated) -->
<div class="absolute inset-0 pointer-events-none overflow-hidden">
<div class="confetti bg-primary opacity-60 top-[10%] left-[20%] rotate-45"></div>
<div class="confetti bg-yellow-400 opacity-60 top-[25%] left-[80%] -rotate-12"></div>
<div class="confetti bg-pink-500 opacity-60 top-[40%] left-[10%] rotate-90"></div>
<div class="confetti bg-blue-400 opacity-60 top-[15%] left-[50%] rotate-12"></div>
<div class="confetti bg-primary opacity-60 top-[60%] left-[85%] -rotate-45"></div>
</div>
<!-- Modal Content -->
<div class="glass-panel w-full max-w-md rounded-xl p-8 flex flex-col items-center text-center mb-8 relative">
<!-- Top Handle -->
<div class="absolute top-3 left-1/2 -translate-x-1/2 h-1.5 w-12 rounded-full bg-white/20"></div>
<!-- Achievement Badge Section -->
<div class="mt-4 relative group">
<div class="absolute inset-0 bg-primary/40 rounded-full blur-2xl animate-pulse"></div>
<div class="relative h-32 w-32 rounded-full bg-gradient-to-tr from-primary to-pink-500 flex items-center justify-center border-4 border-white/20 glow-effect">
<span class="material-symbols-outlined text-white text-6xl" style="font-variation-settings: 'FILL' 1">stars</span>
</div>
<!-- Badge Label -->
<div class="absolute -bottom-2 left-1/2 -translate-x-1/2 bg-white text-background-dark px-4 py-1 rounded-full text-xs font-bold whitespace-nowrap shadow-lg">
                        初めの一歩 (First Step)
                    </div>
</div>
<!-- Rewards & Text -->
<div class="mt-10 space-y-2">
<div class="flex items-center justify-center space-x-2 text-primary">
<span class="text-4xl font-bold tracking-tight">+100 XP</span>
</div>
<h2 class="text-white text-3xl font-bold pt-2">クエスト完了！</h2>
<p class="text-white/70 text-base leading-relaxed max-w-[280px] mx-auto">
                        探索範囲が広がりました！<br/>新しいエリアを発見しました。
                    </p>
</div>
<!-- Level Progress Mini-bar -->
<div class="w-full mt-8 bg-white/10 h-3 rounded-full overflow-hidden p-0.5">
<div class="bg-gradient-to-r from-primary to-pink-500 h-full rounded-full w-[75%]" style="box-shadow: 0 0 10px rgba(140, 37, 244, 0.5)"></div>
</div>
<div class="flex justify-between w-full mt-2 text-[10px] text-white/50 font-medium uppercase tracking-widest">
<span>Level 4</span>
<span>Level 5 まであと 250 XP</span>
</div>
</div>
<!-- Footer Action Button -->
<div class="w-full max-w-md pb-8">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-5 rounded-full shadow-2xl shadow-primary/40 flex items-center justify-center space-x-2 transition-all active:scale-95">
<span class="text-lg">次の冒険へ</span>
<span class="material-symbols-outlined">rocket_launch</span>
</button>
</div>
</div>
</div>
<!-- Hidden bottom sheet indicator style as requested -->
<div class="fixed bottom-0 left-0 w-full h-1 bg-white/5 pointer-events-none"></div>
</body></html>
