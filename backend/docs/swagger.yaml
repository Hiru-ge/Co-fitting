basePath: /
definitions:
  handlers.PlaceResult:
    properties:
      lat:
        type: number
      lng:
        type: number
      name:
        type: string
      photo_reference:
        type: string
      place_id:
        type: string
      rating:
        type: number
      types:
        items:
          type: string
        type: array
      vicinity:
        type: string
    type: object
  handlers.badgeResponse:
    properties:
      description:
        type: string
      earned_at:
        type: string
      icon_url:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  handlers.changePasswordRequest:
    properties:
      current_password:
        type: string
      new_password:
        maxLength: 72
        minLength: 8
        type: string
    required:
    - current_password
    - new_password
    type: object
  handlers.createVisitRequest:
    properties:
      category:
        type: string
      lat:
        type: number
      lng:
        type: number
      place_id:
        type: string
      place_name:
        type: string
      rating:
        type: number
      vicinity:
        type: string
      visited_at:
        type: string
    required:
    - category
    - lat
    - lng
    - place_id
    - place_name
    - visited_at
    type: object
  handlers.googleOAuthRequest:
    properties:
      id_token:
        type: string
    required:
    - id_token
    type: object
  handlers.googleOAuthResponse:
    properties:
      access_token:
        type: string
      is_new_user:
        type: boolean
      refresh_token:
        type: string
    type: object
  handlers.loginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  handlers.logoutRequest:
    properties:
      refresh_token:
        description: オプション（下位互換性のため）
        type: string
    type: object
  handlers.refreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  handlers.signUpRequest:
    properties:
      display_name:
        type: string
      email:
        type: string
      password:
        maxLength: 72
        minLength: 8
        type: string
    required:
    - display_name
    - email
    - password
    type: object
  handlers.suggestionRequest:
    properties:
      lat:
        type: number
      lng:
        type: number
      radius:
        type: integer
    required:
    - lat
    - lng
    type: object
  handlers.updateMeRequest:
    properties:
      display_name:
        type: string
    required:
    - display_name
    type: object
  handlers.userStatsResponse:
    properties:
      challenge_visits:
        type: integer
      comfort_zone_visits:
        type: integer
      level:
        type: integer
      streak_count:
        type: integer
      streak_last:
        type: string
      total_visits:
        type: integer
      total_xp:
        type: integer
    type: object
  models.User:
    properties:
      avatar_url:
        type: string
      created_at:
        type: string
      display_name:
        type: string
      email:
        type: string
      id:
        type: integer
      level:
        type: integer
      settings_json:
        type: string
      streak_count:
        type: integer
      streak_last:
        type: string
      total_xp:
        type: integer
      updated_at:
        type: string
    type: object
  models.Visit:
    properties:
      category:
        type: string
      created_at:
        type: string
      genre_tag_id:
        type: integer
      id:
        type: integer
      is_comfort_zone:
        type: boolean
      lat:
        type: number
      lng:
        type: number
      memo:
        type: string
      place_id:
        type: string
      place_name:
        type: string
      rating:
        type: number
      user_id:
        type: integer
      vicinity:
        type: string
      visited_at:
        type: string
      xp_earned:
        type: integer
    type: object
  utils.TokenPair:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    type: object
host: localhost:8000
info:
  contact: {}
  description: RoambleのバックエンドAPIドキュメント
  title: Roamble API
  version: "1.0"
paths:
  /api/auth/change-password:
    post:
      consumes:
      - application/json
      description: 現在のパスワードを確認し、新しいパスワードに変更する
      parameters:
      - description: パスワード変更情報
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.changePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: パスワード変更
      tags:
      - Auth
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: メールとパスワードで認証し、トークンペアを返す
      parameters:
      - description: ログイン情報
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.TokenPair'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: ログイン
      tags:
      - Auth
  /api/auth/logout:
    post:
      consumes:
      - application/json
      description: アクセストークンとリフレッシュトークンをブラックリストに登録して無効化する
      parameters:
      - description: リフレッシュトークン（オプション）
        in: body
        name: body
        schema:
          $ref: '#/definitions/handlers.logoutRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: ログアウト
      tags:
      - Auth
  /api/auth/oauth/google:
    post:
      consumes:
      - application/json
      description: Google IDトークンを検証し、ユーザー登録/ログインを行いJWTトークンペアを返す
      parameters:
      - description: Google IDトークン
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.googleOAuthRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.googleOAuthResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Google OAuth認証
      tags:
      - Auth
  /api/auth/refresh:
    post:
      consumes:
      - application/json
      description: リフレッシュトークンを使用して新しいアクセストークンを取得する
      parameters:
      - description: リフレッシュトークン
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.refreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: トークンリフレッシュ
      tags:
      - Auth
  /api/auth/signup:
    post:
      consumes:
      - application/json
      description: 新しいユーザーを登録し、トークンペアを返す
      parameters:
      - description: 登録情報
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.signUpRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/utils.TokenPair'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      summary: ユーザー登録
      tags:
      - Auth
  /api/suggestions:
    post:
      consumes:
      - application/json
      description: 指定した位置情報の周辺から、訪れたことのない場所を最大3件提案する。同一ユーザー・同一日・同一エリアでは同じ結果を返す（日次キャッシュ）
      parameters:
      - description: 位置情報と半径
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.suggestionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.PlaceResult'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 場所の提案
      tags:
      - Suggestion
  /api/users/me:
    get:
      description: JWT認証済みユーザーの情報を返す
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.User'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: ユーザー情報取得
      tags:
      - Users
    patch:
      consumes:
      - application/json
      description: JWT認証済みユーザーの表示名を更新する
      parameters:
      - description: 更新情報
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.updateMeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.User'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: ユーザー情報更新
      tags:
      - Users
  /api/users/me/badges:
    get:
      description: JWT認証済みユーザーの獲得バッジ一覧を返す（獲得日時の降順）
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.badgeResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 獲得バッジ一覧取得
      tags:
      - Users
  /api/users/me/stats:
    get:
      description: JWT認証済みユーザーのレベル・XP・ストリーク・訪問統計を返す
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.userStatsResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: ユーザー統計情報取得
      tags:
      - Users
  /api/visits:
    get:
      description: ユーザーの訪問履歴を一覧取得する（visited_at降順）
      parameters:
      - description: 取得件数（デフォルト20）
        in: query
        name: limit
        type: integer
      - description: オフセット（デフォルト0）
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 訪問履歴取得
      tags:
      - Visits
    post:
      consumes:
      - application/json
      description: ユーザーの訪問記録を作成する（category、place_name を必須で受け付け）
      parameters:
      - description: 訪問記録データ
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.createVisitRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Visit'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 訪問記録作成
      tags:
      - Visits
  /health:
    get:
      description: サーバーのヘルスチェック用エンドポイント
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: ヘルスチェック
      tags:
      - Health
swagger: "2.0"
