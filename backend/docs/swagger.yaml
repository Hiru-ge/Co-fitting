basePath: /
definitions:
  handlers.NotificationSettingsResponse:
    properties:
      is_daily_suggestion_enabled:
        type: boolean
      is_email_enabled:
        type: boolean
      is_monthly_summary_enabled:
        type: boolean
      is_push_enabled:
        type: boolean
      is_streak_reminder_enabled:
        type: boolean
      is_weekly_summary_enabled:
        type: boolean
    type: object
  handlers.SubscribePushRequest:
    properties:
      auth:
        type: string
      endpoint:
        type: string
      p256dh:
        type: string
      user_agent:
        type: string
    required:
    - auth
    - endpoint
    - p256dh
    type: object
  handlers.SuggestionResult:
    properties:
      is_completed:
        type: boolean
      notice:
        type: string
      places:
        items:
          $ref: '#/definitions/services.PlaceResult'
        type: array
      reload_count_remaining:
        type: integer
    type: object
  handlers.UnsubscribePushRequest:
    properties:
      endpoint:
        type: string
    required:
    - endpoint
    type: object
  handlers.UpdateNotificationSettingsRequest:
    properties:
      is_daily_suggestion_enabled:
        type: boolean
      is_email_enabled:
        type: boolean
      is_monthly_summary_enabled:
        type: boolean
      is_push_enabled:
        type: boolean
      is_streak_reminder_enabled:
        type: boolean
      is_weekly_summary_enabled:
        type: boolean
    type: object
  handlers.VAPIDKeyResponse:
    properties:
      vapid_public_key:
        type: string
    type: object
  handlers.allBadgeResponse:
    properties:
      description:
        type: string
      icon_url:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  handlers.badgeResponse:
    properties:
      description:
        type: string
      earned_at:
        type: string
      icon_url:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  handlers.betaVerifyRequest:
    properties:
      passphrase:
        type: string
    required:
    - passphrase
    type: object
  handlers.cacheKeyStats:
    properties:
      key:
        type: string
      memory_bytes:
        type: integer
      ttl_seconds:
        type: integer
    type: object
  handlers.cacheStatsResponse:
    properties:
      key_count:
        type: integer
      keys:
        items:
          $ref: '#/definitions/handlers.cacheKeyStats'
        type: array
    type: object
  handlers.createVisitRequest:
    properties:
      category:
        type: string
      lat:
        type: number
      lng:
        type: number
      photo_reference:
        type: string
      place_id:
        type: string
      place_name:
        type: string
      place_types:
        items:
          type: string
        type: array
      user_lat:
        type: number
      user_lng:
        type: number
      vicinity:
        type: string
      visited_at:
        type: string
    required:
    - category
    - lat
    - lng
    - place_id
    - place_name
    - visited_at
    type: object
  handlers.createVisitResponse:
    properties:
      category:
        type: string
      created_at:
        type: string
      genre_tag_id:
        type: integer
      id:
        type: integer
      is_breakout:
        type: boolean
      is_daily_completed:
        type: boolean
      is_level_up:
        type: boolean
      lat:
        type: number
      lng:
        type: number
      memo:
        type: string
      new_badges:
        items:
          $ref: '#/definitions/models.Badge'
        type: array
      new_level:
        type: integer
      photo_reference:
        type: string
      place_id:
        type: string
      place_name:
        type: string
      rating:
        type: number
      total_xp:
        type: integer
      user_id:
        type: integer
      vicinity:
        type: string
      visited_at:
        type: string
      xp_breakdown:
        $ref: '#/definitions/services.XPBreakdown'
      xp_earned:
        type: integer
    type: object
  handlers.genreTagResponse:
    properties:
      category:
        type: string
      icon:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  handlers.googleOAuthRequest:
    properties:
      id_token:
        type: string
    required:
    - id_token
    type: object
  handlers.googleOAuthResponse:
    properties:
      access_token:
        type: string
      is_new_user:
        type: boolean
      refresh_token:
        type: string
    type: object
  handlers.interestResponse:
    properties:
      category:
        type: string
      genre_tag_id:
        type: integer
      icon:
        type: string
      name:
        type: string
    type: object
  handlers.listVisitsResponse:
    properties:
      total:
        type: integer
      visits:
        items:
          $ref: '#/definitions/models.Visit'
        type: array
    type: object
  handlers.logoutRequest:
    properties:
      refresh_token:
        description: オプション
        type: string
    type: object
  handlers.mapVisitItem:
    properties:
      category:
        type: string
      genre_tag_id:
        type: integer
      id:
        type: integer
      lat:
        type: number
      lng:
        type: number
      place_id:
        type: string
      place_name:
        type: string
      visited_at:
        type: string
    type: object
  handlers.mapVisitsResponse:
    properties:
      total:
        type: integer
      visits:
        items:
          $ref: '#/definitions/handlers.mapVisitItem'
        type: array
    type: object
  handlers.proficiencyResponse:
    properties:
      category:
        type: string
      genre_name:
        type: string
      genre_tag_id:
        type: integer
      icon:
        type: string
      level:
        type: integer
      xp:
        type: integer
    type: object
  handlers.refreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  handlers.suggestionRequest:
    properties:
      is_reload:
        type: boolean
      lat:
        type: number
      lng:
        type: number
      radius:
        type: integer
      should_filter_open_now:
        type: boolean
    required:
    - lat
    - lng
    type: object
  handlers.testLoginRequest:
    properties:
      display_name:
        type: string
      email:
        type: string
    required:
    - display_name
    - email
    type: object
  handlers.triggerNotificationRequest:
    properties:
      type:
        type: string
    required:
    - type
    type: object
  handlers.updateInterestsRequest:
    properties:
      genre_tag_ids:
        items:
          type: integer
        type: array
    required:
    - genre_tag_ids
    type: object
  handlers.updateInterestsResponse:
    properties:
      interests:
        items:
          $ref: '#/definitions/handlers.interestResponse'
        type: array
      reload_count_remaining:
        type: integer
    type: object
  handlers.updateMeRequest:
    properties:
      display_name:
        type: string
      search_radius:
        type: integer
    type: object
  handlers.updateMeResponse:
    properties:
      avatar_url:
        type: string
      created_at:
        type: string
      display_name:
        type: string
      email:
        type: string
      id:
        type: integer
      level:
        type: integer
      reload_count_remaining:
        type: integer
      search_radius:
        type: integer
      settings_json:
        type: string
      streak_count:
        type: integer
      streak_last:
        type: string
      total_xp:
        type: integer
      updated_at:
        type: string
    type: object
  handlers.updateVisitRequest:
    properties:
      memo:
        type: string
      rating:
        type: number
    type: object
  handlers.userStatsResponse:
    properties:
      breakout_visits:
        type: integer
      challenge_visits:
        type: integer
      level:
        type: integer
      streak_count:
        type: integer
      streak_last:
        type: string
      total_visits:
        type: integer
      total_xp:
        type: integer
    type: object
  models.Badge:
    properties:
      condition_json:
        type: string
      description:
        type: string
      icon_url:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  models.User:
    properties:
      avatar_url:
        type: string
      created_at:
        type: string
      display_name:
        type: string
      email:
        type: string
      id:
        type: integer
      level:
        type: integer
      search_radius:
        type: integer
      settings_json:
        type: string
      streak_count:
        type: integer
      streak_last:
        type: string
      total_xp:
        type: integer
      updated_at:
        type: string
    type: object
  models.Visit:
    properties:
      category:
        type: string
      created_at:
        type: string
      genre_tag_id:
        type: integer
      id:
        type: integer
      is_breakout:
        type: boolean
      lat:
        type: number
      lng:
        type: number
      memo:
        type: string
      photo_reference:
        type: string
      place_id:
        type: string
      place_name:
        type: string
      rating:
        type: number
      user_id:
        type: integer
      vicinity:
        type: string
      visited_at:
        type: string
      xp_earned:
        type: integer
    type: object
  services.PlaceResult:
    properties:
      is_breakout:
        type: boolean
      is_interest_match:
        type: boolean
      is_open_now:
        type: boolean
      lat:
        type: number
      lng:
        type: number
      name:
        type: string
      photo_reference:
        type: string
      place_id:
        type: string
      rating:
        type: number
      types:
        items:
          type: string
        type: array
      vicinity:
        type: string
    type: object
  services.XPBreakdown:
    properties:
      base_xp:
        description: ベースXP（通常50 or チャレンジ100）
        type: integer
      first_area_bonus:
        description: 初エリアボーナス
        type: integer
      streak_bonus:
        description: ストリークボーナス
        type: integer
    type: object
host: localhost:8000
info:
  contact: {}
  description: RoambleのバックエンドAPIドキュメント
  title: Roamble API
  version: "1.0"
paths:
  /api/auth/logout:
    post:
      consumes:
      - application/json
      description: アクセストークンとリフレッシュトークンをブラックリストに登録して無効化する
      parameters:
      - description: リフレッシュトークン（オプション）
        in: body
        name: body
        schema:
          $ref: '#/definitions/handlers.logoutRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: ログアウト
      tags:
      - Auth
  /api/auth/oauth/google:
    post:
      consumes:
      - application/json
      description: Google IDトークンを検証し、ユーザー登録/ログインを行いJWTトークンペアを返す
      parameters:
      - description: Google IDトークン
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.googleOAuthRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.googleOAuthResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Google OAuth認証
      tags:
      - Auth
  /api/auth/refresh:
    post:
      consumes:
      - application/json
      description: リフレッシュトークンを使用して新しいアクセストークンを取得する
      parameters:
      - description: リフレッシュトークン
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.refreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: access_token を返す
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: トークンリフレッシュ
      tags:
      - Auth
  /api/badges:
    get:
      description: バッジマスタの全一覧を返す
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.allBadgeResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 全バッジ一覧取得
      tags:
      - Badges
  /api/beta/verify:
    post:
      consumes:
      - application/json
      parameters:
      - description: 合言葉
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.betaVerifyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: ベータ合言葉照合
      tags:
      - Beta
  /api/dev/auth/test-login:
    post:
      consumes:
      - application/json
      description: 指定emailのユーザーでテストログインし、JWTアクセストークン/リフレッシュトークンを返す（development環境のみ有効）
      parameters:
      - description: テストログイン情報
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.testLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: テストログイン（開発用）
      tags:
      - Dev
  /api/dev/notifications/trigger:
    post:
      consumes:
      - application/json
      description: 指定した通知タイプを即時実行する（development環境のみ有効）
      parameters:
      - description: 通知タイプ
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.triggerNotificationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 通知即時発火（開発用）
      tags:
      - Dev
  /api/dev/suggestions/cache:
    delete:
      description: 提案関連のRedisキャッシュを削除する（development環境のみ有効）
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 提案キャッシュ削除（開発用）
      tags:
      - Dev
  /api/dev/suggestions/stats:
    get:
      description: 提案関連キャッシュのキー数・TTL・メモリ使用量を返す（development環境のみ有効）
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.cacheStatsResponse'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 提案キャッシュ統計取得（開発用）
      tags:
      - Dev
  /api/genres:
    get:
      description: ジャンルタグマスタの全一覧をカテゴリ順で返す
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.genreTagResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 全ジャンルタグ一覧取得
      tags:
      - Genres
  /api/notifications/push/subscribe:
    delete:
      consumes:
      - application/json
      description: 指定endpointのPush通知購読をDBから削除する。存在しない場合も204を返す（冪等）。
      parameters:
      - description: 解除するendpoint
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.UnsubscribePushRequest'
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Push購読解除
      tags:
      - Notifications
    post:
      consumes:
      - application/json
      description: Push通知購読をDBに登録する。同一endpointが存在する場合はUpsert。
      parameters:
      - description: 購読情報
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.SubscribePushRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 既存購読更新
          schema:
            additionalProperties:
              type: string
            type: object
        "201":
          description: 新規購読登録
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Push購読登録
      tags:
      - Notifications
  /api/notifications/push/vapid-key:
    get:
      description: Web Push通知用のVAPID公開鍵を返す
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.VAPIDKeyResponse'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: VAPID公開鍵取得
      tags:
      - Notifications
  /api/notifications/settings:
    get:
      description: ユーザーの通知設定を取得する
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.NotificationSettingsResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 通知設定取得
      tags:
      - Notifications
    put:
      consumes:
      - application/json
      description: ユーザーの通知設定を更新する。送信されたフィールドのみ更新（部分更新）。
      parameters:
      - description: 更新する通知設定
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.UpdateNotificationSettingsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.NotificationSettingsResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 通知設定更新
      tags:
      - Notifications
  /api/places/{place_id}/snooze:
    post:
      description: 指定したお店を一定期間提案から除外する。期間は days クエリパラメータで指定する（1〜365の整数、必須）。
      parameters:
      - description: Place ID
        in: path
        name: place_id
        required: true
        type: string
      - description: スヌーズ期間（日数、1〜365）
        in: query
        name: days
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: お店のスヌーズ設定
      tags:
      - Places
  /api/places/{placeId}/photo:
    get:
      description: Place ID に対応する写真URLを取得する。キャッシュ未ヒット時のみ photo_reference を使って解決する
      parameters:
      - description: Place ID
        in: path
        name: placeId
        required: true
        type: string
      - description: Google Places Photo Reference（キャッシュ未ヒット時に必須）
        in: query
        name: photo_reference
        type: string
      - description: 画像最大幅ピクセル（デフォルト2000）
        in: query
        name: maxWidth
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
