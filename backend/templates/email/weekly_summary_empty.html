{{template "header" .}}
<div style="padding: 32px 24px;">
  <p style="color: #b0cccc; font-size: 16px; line-height: 1.6; margin: 0 0 8px;">
    {{.UserName}}さん、今週もお疲れ!
  </p>
  <h2 style="color: #ffffff; margin: 0 0 24px; font-size: 20px;">今週の冒険レポート</h2>

  <div style="background-color: #1a3333; border-radius: 16px; padding: 32px 24px; margin: 0 0 24px; text-align: center;">
    <h3 style="color: #b0cccc; margin: 0 0 12px; font-size: 18px;">今週は冒険できなかったね</h3>
    <p style="color: #6b8a8a; font-size: 15px; line-height: 1.6; margin: 0;">
      忙しい週もあるよね。大丈夫!<br>
      来週は一歩だけ踏み出してみよう!
    </p>
  </div>

  <div style="background-color: #1a3333; border-radius: 12px; padding: 20px 24px; margin: 0 0 24px;">
    <p style="color: #b0cccc; font-size: 14px; margin: 0; line-height: 1.6;">
      <strong style="color: #13ecec;">ヒント</strong>: まずは近所の気になるカフェや公園から。<br>
      小さな一歩が、大きな冒険のはじまりだよ。
    </p>
  </div>

  <div style="text-align: center; margin: 32px 0 0;">
    <a href="https://roamble.app"
       style="background-color: #525BBB; color: #ffffff; text-decoration: none;
              padding: 14px 32px; border-radius: 8px; font-size: 16px; font-weight: bold; display: inline-block;">
      来週の冒険先を見てみる
    </a>
  </div>
</div>
{{template "footer" .}}
