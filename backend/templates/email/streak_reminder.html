{{template "header" .}}
<div style="padding: 32px 24px;">
  <h2 style="color: #c2410c; margin-bottom: 16px;">⚠️ やばい、ストリーク切れちゃうよ！</h2>
  <p style="color: #4a4a4a; font-size: 16px; line-height: 1.6;">
    {{.UserName}}、今週まだ訪問してないよ〜！
  </p>
  <p style="color: #4a4a4a; font-size: 16px; line-height: 1.6;">
    <strong style="color: #f97316;">{{.StreakWeeks}} 週連続</strong> を積み上げてきたのに、<br>
    今日中に場所を記録しないとリセットされちゃう😱<br>
    ちょっとそこまでお散歩でも全然OK！
  </p>
  <div style="text-align: center; margin: 32px 0;">
    <a href="https://roamble.app"
       style="background-color: #f97316; color: #ffffff; text-decoration: none;
              padding: 14px 32px; border-radius: 8px; font-size: 16px; font-weight: bold;">
      今日の場所を探す
    </a>
  </div>
  <p style="color: #9a9a9a; font-size: 13px; line-height: 1.6;">
    行ったあとに記録するだけでOK。ストリーク、守り切ろう！
  </p>
</div>
{{template "footer" .}}
