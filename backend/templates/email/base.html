{{define "header"}}<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roamble</title>
</head>
<body style="margin: 0; padding: 0; background-color: #0a1616; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
  <div style="max-width: 600px; margin: 0 auto; background-color: #102222; border-radius: 12px; overflow: hidden; margin-top: 24px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.3);">
    <!-- ヘッダー -->
    <div style="background-color: #525BBB; padding: 28px; text-align: center;">
      <h1 style="color: #ffffff; margin: 0; font-size: 26px; font-weight: bold; letter-spacing: 0.08em;">Roamble</h1>
      <p style="color: rgba(255,255,255,0.75); margin: 6px 0 0; font-size: 13px;">「また同じ店」を、卒業しよう。</p>
    </div>
{{end}}

{{define "footer"}}
    <!-- フッター -->
    <div style="background-color: #0a1616; padding: 24px; text-align: center; border-top: 1px solid #1a3333;">
      <p style="color: #6b8a8a; font-size: 12px; margin: 0 0 8px;">
        このメールはRoambleから自動送信されています。
      </p>
      <p style="color: #6b8a8a; font-size: 12px; margin: 0;">
        通知設定の変更は <a href="https://roamble.app/settings" style="color: #13ecec;">設定ページ</a> から行えます。
      </p>
    </div>
  </div>
</body>
</html>
{{end}}
